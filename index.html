<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCAT Practice App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 24px;
    }

    .hidden {
      display: none;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .subject-btn,
    .choice,
    .nav-btn,
    .action-btn,
    .timer-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      cursor: pointer;
    }

    .subject-btn,
    .action-btn,
    .timer-btn {
      background: #2563eb;
      color: white;
    }

    .subject-btn:hover,
    .action-btn:hover,
    .timer-btn:hover,
    .nav-btn:hover {
      opacity: 0.95;
    }

    .question-box {
      margin-bottom: 20px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .question-number {
      font-size: 0.95rem;
      color: #2563eb;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .choice {
      text-align: left;
      background: #eef2ff;
      color: #111827;
    }

    .choice:hover {
      background: #dbeafe;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #2563eb;
      color: white;
      flex: 1;
      min-width: 120px;
    }

    .nav-btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      display: none;
    }

    .feedback.correct {
      background: #dcfce7;
      color: #166534;
    }

    .feedback.incorrect {
      background: #fee2e2;
      color: #991b1b;
    }

    .score,
    .timer,
    .subject-label {
      font-weight: bold;
    }

    .summary-box {
      text-align: center;
      padding: 28px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
    }

    .summary-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MCAT Practice App</h1>
    <p class="subtitle">Pick a subject, answer randomized questions, track your score, and optionally practice with a timer.</p>

    <div id="subject-screen">
      <h2>Choose a Subject</h2>
      <p>Select one category to start your practice quiz.</p>
      <div style="margin-top: 16px; margin-bottom: 12px;">
        <button class="timer-btn" id="timer-toggle-btn">Timer: Off</button>
      </div>
      <div class="subject-grid">
        <button class="subject-btn" onclick="selectSubject('biology')">Biology</button>
        <button class="subject-btn" onclick="selectSubject('chemistry')">Chemistry</button>
        <button class="subject-btn" onclick="selectSubject('physics')">Physics</button>
        <button class="subject-btn" onclick="selectSubject('psychology')">Psychology</button>
      </div>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="question-box">
        <div class="top-bar">
          <div class="subject-label" id="subject-label"></div>
          <div class="timer" id="timer">Timer: Off</div>
          <div class="score" id="score">Score: 0</div>
        </div>
        <div class="question-number" id="question-number"></div>
        <div id="question-text"></div>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
      </div>

      <div class="nav">
        <button class="nav-btn" id="prev-btn">Previous</button>
        <button class="nav-btn" id="next-btn">Next</button>
      </div>
    </div>

    <div id="summary-screen" class="hidden">
      <div class="summary-box">
        <h2>Quiz Complete 🎉</h2>
        <p id="summary-subject"></p>
        <p id="summary-score"></p>
        <p id="summary-percent"></p>
        <div class="summary-actions">
          <button class="action-btn" onclick="restartQuiz()">Restart Same Subject</button>
          <button class="action-btn" onclick="goHome()">Choose Another Subject</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const questionBank = {
      biology: [
{
  question: "Which structure is primarily responsible for ATP production in eukaryotic cells?",
  choices: ["Nucleus", "Mitochondria", "Ribosome", "Golgi apparatus"],
  answer: "Mitochondria",
  explanation: "Mitochondria generate ATP through oxidative phosphorylation."
},
{
  question: "Which process directly produces glucose in plants?",
  choices: ["Respiration", "Fermentation", "Photosynthesis", "Translation"],
  answer: "Photosynthesis",
  explanation: "Photosynthesis converts light energy into chemical energy stored in glucose."
},
{
  question: "What type of bond forms between amino acids?",
  choices: ["Hydrogen bond", "Peptide bond", "Ionic bond", "Disulfide bond"],
  answer: "Peptide bond",
  explanation: "Peptide bonds link amino acids together to form proteins."
},
{
  question: "Which phase of mitosis involves separation of sister chromatids?",
  choices: ["Prophase", "Metaphase", "Anaphase", "Telophase"],
  answer: "Anaphase",
  explanation: "During anaphase, sister chromatids are pulled apart to opposite poles."
},
{
  question: "Which macromolecule stores genetic information?",
  choices: ["Protein", "Carbohydrate", "DNA", "Lipid"],
  answer: "DNA",
  explanation: "DNA contains genetic instructions for cellular function."
},
{
  question: "Which organelle modifies and packages proteins?",
  choices: ["Lysosome", "Golgi apparatus", "Nucleus", "Mitochondria"],
  answer: "Golgi apparatus",
  explanation: "The Golgi modifies and packages proteins for transport."
},
{
  question: "Which molecule is the primary energy currency of the cell?",
  choices: ["ADP", "ATP", "DNA", "Glucose"],
  answer: "ATP",
  explanation: "ATP stores and transfers energy within cells."
},
{
  question: "Which type of transport requires energy?",
  choices: ["Diffusion", "Facilitated diffusion", "Active transport", "Osmosis"],
  answer: "Active transport",
  explanation: "Active transport uses ATP to move substances against a gradient."
},
{
  question: "What happens during transcription?",
  choices: ["DNA → RNA", "RNA → Protein", "Protein → DNA", "RNA → DNA"],
  answer: "DNA → RNA",
  explanation: "Transcription produces mRNA from a DNA template."
},
{
  question: "Which structure controls what enters and leaves the cell?",
  choices: ["Nucleus", "Cell membrane", "Ribosome", "Cytoskeleton"],
  answer: "Cell membrane",
  explanation: "The cell membrane regulates transport into and out of the cell."
},
{
  question: "Which type of RNA carries amino acids to the ribosome?",
  choices: ["mRNA", "tRNA", "rRNA", "snRNA"],
  answer: "tRNA",
  explanation: "tRNA delivers amino acids during protein synthesis."
},
{
  question: "Which system is responsible for transporting oxygen in the body?",
  choices: ["Nervous system", "Respiratory system", "Circulatory system", "Digestive system"],
  answer: "Circulatory system",
  explanation: "Blood carries oxygen via hemoglobin in red blood cells."
},
{
  question: "Which enzyme unwinds DNA during replication?",
  choices: ["Ligase", "Helicase", "Polymerase", "Primase"],
  answer: "Helicase",
  explanation: "Helicase separates DNA strands for replication."
},
{
  question: "Which structure contains digestive enzymes?",
  choices: ["Nucleus", "Lysosome", "Mitochondria", "Golgi"],
  answer: "Lysosome",
  explanation: "Lysosomes break down waste and cellular debris."
},
{
  question: "What is the main function of ribosomes?",
  choices: ["DNA storage", "Protein synthesis", "Energy production", "Cell division"],
  answer: "Protein synthesis",
  explanation: "Ribosomes translate mRNA into proteins."
},
{
  question: "Which phase includes DNA replication?",
  choices: ["G1 phase", "S phase", "G2 phase", "M phase"],
  answer: "S phase",
  explanation: "DNA is replicated during the S (synthesis) phase."
},
{
  question: "Which molecule is hydrophobic?",
  choices: ["Glucose", "Water", "Lipid", "Protein"],
  answer: "Lipid",
  explanation: "Lipids are nonpolar and repel water."
},
{
  question: "Which part of the neuron transmits signals away from the cell body?",
  choices: ["Dendrite", "Axon", "Synapse", "Nucleus"],
  answer: "Axon",
  explanation: "The axon carries impulses away from the neuron."
},
{
  question: "Which structure is found only in plant cells?",
  choices: ["Mitochondria", "Cell wall", "Nucleus", "Ribosome"],
  answer: "Cell wall",
  explanation: "Plant cells have a rigid cell wall for support."
},
{
  question: "Which blood cells fight infection?",
  choices: ["Red blood cells", "Platelets", "White blood cells", "Plasma"],
  answer: "White blood cells",
  explanation: "White blood cells are part of the immune system."
},
{
  question: "Which process moves water across a membrane?",
  choices: ["Diffusion", "Osmosis", "Active transport", "Endocytosis"],
  answer: "Osmosis",
  explanation: "Osmosis is the movement of water across a semipermeable membrane."
},
{
  question: "Which structure stores calcium in muscle cells?",
  choices: ["Mitochondria", "Sarcoplasmic reticulum", "Golgi", "Nucleus"],
  answer: "Sarcoplasmic reticulum",
  explanation: "It regulates calcium for muscle contraction."
},
{
  question: "Which organ filters blood and produces urine?",
  choices: ["Liver", "Kidney", "Heart", "Lung"],
  answer: "Kidney",
  explanation: "Kidneys remove waste and regulate fluid balance."
},
{
  question: "Which level of protein structure is determined by amino acid sequence?",
  choices: ["Primary", "Secondary", "Tertiary", "Quaternary"],
  answer: "Primary",
  explanation: "Primary structure is the linear sequence of amino acids."
},
{
  question: "Which hormone regulates blood glucose levels?",
  choices: ["Insulin", "Testosterone", "Estrogen", "Melatonin"],
  answer: "Insulin",
  explanation: "Insulin lowers blood glucose by promoting uptake into cells."
}
]
      ]
    };

    let currentSubject = "";
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answeredQuestions = new Set();
    let userAnswers = {};
    let timerEnabled = false;
    let timeLeft = 0;
    let timerInterval = null;

    const subjectScreen = document.getElementById("subject-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const summaryScreen = document.getElementById("summary-screen");
    const subjectLabel = document.getElementById("subject-label");
    const questionNumber = document.getElementById("question-number");
    const questionText = document.getElementById("question-text");
    const choicesContainer = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const scoreDisplay = document.getElementById("score");
    const timerDisplay = document.getElementById("timer");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const timerToggleBtn = document.getElementById("timer-toggle-btn");

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function formatSubjectName(subject) {
      return subject.charAt(0).toUpperCase() + subject.slice(1);
    }

    function updateTimerToggleLabel() {
      timerToggleBtn.textContent = timerEnabled ? "Timer: On" : "Timer: Off";
    }

    timerToggleBtn.addEventListener("click", () => {
      timerEnabled = !timerEnabled;
      updateTimerToggleLabel();
    });

    function selectSubject(subject) {
      currentSubject = subject;
      currentQuestions = shuffle(questionBank[subject]);
      currentQuestionIndex = 0;
      score = 0;
      answeredQuestions = new Set();
      userAnswers = {};
      clearTimer();

      if (timerEnabled) {
        timeLeft = currentQuestions.length * 30;
        startTimer();
      } else {
        timerDisplay.textContent = "Timer: Off";
      }

      subjectLabel.textContent = `Subject: ${formatSubjectName(subject)}`;
      subjectScreen.classList.add("hidden");
      summaryScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      loadQuestion();
    }

    function loadQuestion() {
      const q = currentQuestions[currentQuestionIndex];
      questionNumber.textContent = `Question ${currentQuestionIndex + 1} of ${currentQuestions.length}`;
      questionText.textContent = q.question;
      choicesContainer.innerHTML = "";
      feedback.style.display = "none";
      feedback.className = "feedback";
      scoreDisplay.textContent = `Score: ${score}`;

      q.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choice;
        btn.onclick = () => checkAnswer(choice);

        if (userAnswers[currentQuestionIndex]) {
          btn.disabled = true;
        }

        choicesContainer.appendChild(btn);
      });

      if (userAnswers[currentQuestionIndex]) {
        const selectedChoice = userAnswers[currentQuestionIndex];
        if (selectedChoice === q.answer) {
          feedback.className = "feedback correct";
          feedback.textContent = `Correct! ${q.explanation}`;
        } else {
          feedback.className = "feedback incorrect";
          feedback.textContent = `Incorrect. Correct answer: ${q.answer}. ${q.explanation}`;
        }
        feedback.style.display = "block";
      }

      prevBtn.disabled = currentQuestionIndex === 0;
      nextBtn.textContent = currentQuestionIndex === currentQuestions.length - 1 ? "Finish Quiz" : "Next";
    }

    function checkAnswer(selectedChoice) {
      const q = currentQuestions[currentQuestionIndex];

      if (answeredQuestions.has(currentQuestionIndex)) {
        feedback.style.display = "block";
        feedback.className = "feedback incorrect";
        feedback.textContent = "You already answered this question. Use Next or Previous.";
        return;
      }

      answeredQuestions.add(currentQuestionIndex);
      userAnswers[currentQuestionIndex] = selectedChoice;

      if (selectedChoice === q.answer) {
        score++;
        feedback.className = "feedback correct";
        feedback.textContent = `Correct! ${q.explanation}`;
      } else {
        feedback.className = "feedback incorrect";
        feedback.textContent = `Incorrect. Correct answer: ${q.answer}. ${q.explanation}`;
      }

      feedback.style.display = "block";
      scoreDisplay.textContent = `Score: ${score}`;
      loadQuestion();
    }

    function startTimer() {
      clearTimer();
      timerDisplay.textContent = `Time: ${timeLeft}s`;

      timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `Time: ${timeLeft}s`;

        if (timeLeft <= 0) {
          clearTimer();
          showSummary();
        }
      }, 1000);
    }

    function clearTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function showSummary() {
      clearTimer();
      quizScreen.classList.add("hidden");
      summaryScreen.classList.remove("hidden");

      const total = currentQuestions.length;
      const percent = total > 0 ? Math.round((score / total) * 100) : 0;

      document.getElementById("summary-subject").textContent = `Subject: ${formatSubjectName(currentSubject)}`;
      document.getElementById("summary-score").textContent = `Your Score: ${score} / ${total}`;
      document.getElementById("summary-percent").textContent = `Percentage: ${percent}%`;
    }

    function restartQuiz() {
      selectSubject(currentSubject);
    }

    function goHome() {
      clearTimer();
      subjectScreen.classList.remove("hidden");
      quizScreen.classList.add("hidden");
      summaryScreen.classList.add("hidden");
      currentSubject = "";
    }

    prevBtn.onclick = () => {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        loadQuestion();
      }
    };

    nextBtn.onclick = () => {
      if (currentQuestionIndex === currentQuestions.length - 1) {
        showSummary();
      } else {
        currentQuestionIndex++;
        loadQuestion();
      }
    };

    updateTimerToggleLabel();
  </script>
</body>
</html>
